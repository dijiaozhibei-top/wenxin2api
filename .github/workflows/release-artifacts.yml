name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/publish (e.g. v4.6.1)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.x"
  NODE_VERSION: "24"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: |
          npm ci --prefix webui --prefer-offline --no-audit
          npm run build --prefix webui

      - name: Build Multi-Platform Archives
        env:
          RELEASE_BUILD_JOBS: "3"
        run: ./scripts/build-release-archives.sh

      - name: Prepare Docker release inputs
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          mkdir -p dist/docker-input
          cp "dist/wenxin2api_${TAG}_linux_amd64.tar.gz" "dist/docker-input/linux_amd64.tar.gz" 2>/dev/null || cp "dist/ds2api_${TAG}_linux_amd64.tar.gz" "dist/docker-input/linux_amd64.tar.gz"
          cp "dist/wenxin2api_${TAG}_linux_arm64.tar.gz" "dist/docker-input/linux_arm64.tar.gz" 2>/dev/null || cp "dist/ds2api_${TAG}_linux_arm64.tar.gz" "dist/docker-input/linux_arm64.tar.gz"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image (Docker Hub)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime-from-dist
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wenxin2api:${{ env.RELEASE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wenxin2api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum *.tar.gz *.zip > sha256sums.txt)

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          FILES=(
            dist/*.tar.gz
            dist/*.zip
            dist/sha256sums.txt
          )
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${TAG}" "${FILES[@]}" --title "${TAG}" --notes ""
          fi
