services:
  wenxin2api:
    image: ghcr.io/cjackhwang/wenxin2api:latest
    container_name: wenxin2api
    restart: always
    env_file:
      - .env
    ports:
      # Host port is configurable via wenxin2api_HOST_PORT; container port stays fixed at 5001.
      - "${wenxin2api_HOST_PORT:-6011}:5001"
    volumes:
      - ./config.json:/data/config.json   # 配置文件（持久化推荐路径）
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - wenxin2api_ADMIN_KEY=${wenxin2api_ADMIN_KEY:-wenxin2api}
      - wenxin2api_CONFIG_PATH=/data/config.json
